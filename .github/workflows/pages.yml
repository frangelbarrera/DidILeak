name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/demo/**"
      - "examples/chatgpt_export_sample.json"
      - "didileak/reporters/html.py"
      - "didileak/detectors/**"
      - "didileak/parsers/**"
      - "didileak/models.py"
      - "didileak/cli.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install didileak
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Regenerate demo report.html from example export
        run: |
          python -c "
          from pathlib import Path
          from didileak.cli import scan_path
          from didileak.reporters import render_html
          r = scan_path(Path('examples/chatgpt_export_sample.json'))
          Path('docs/demo/report.html').write_text(render_html(r), encoding='utf-8')
          print(f'Regenerated docs/demo/report.html — {r.total_findings} findings')
          "
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
